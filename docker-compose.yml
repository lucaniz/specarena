# Auth-enabled mode (default)
# Requires AUTH_SECRET — set in .env or your shell environment.
#
# For engine-only (no auth): docker compose -f docker-compose.engine.yml up
services:
  engine:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: ["node", "--import", "tsx", "server/auth/start.ts"]
    environment:
      - PORT=3001
      - AUTH_SECRET=${AUTH_SECRET:?Set AUTH_SECRET in .env or environment}
    ports:
      - "3001:3001"
  leaderboard:
    build:
      context: .
      dockerfile: leaderboard/Dockerfile
    environment:
      # Internal Docker network — leaderboard talks to engine by service name
      - ENGINE_URL=http://engine:3001
    ports:
      - "3000:3000"
    depends_on:
      - engine